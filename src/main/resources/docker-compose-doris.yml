services:
  doris-fe:
    image: apache/doris:fe-2.1.8
    container_name: doris-fe
    hostname: doris-fe
    environment:
      - FE_SERVERS=fe1:172.30.0.2:9010
      - FE_ID=1
    ports:
      - "8030:8030"   # FE Web UI / Stream Load HTTP
      - "9030:9030"   # MySQL 协议端口
    volumes:
      - ./data/fe/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./data/fe/log:/opt/apache-doris/fe/log
    networks:
      doris_net:
        ipv4_address: 172.30.0.2

  doris-be:
    image: apache/doris:be-2.1.8
    container_name: doris-be
    hostname: doris-be
    depends_on:
      - doris-fe
    environment:
      - FE_SERVERS=fe1:172.30.0.2:9010
      - BE_ADDR=172.30.0.3:9050
      - SKIP_CHECK_ULIMIT=true
    ports:
      - "8040:8040"   # BE HTTP
    volumes:
      - ./data/be/storage:/opt/apache-doris/be/storage
      - ./data/be/log:/opt/apache-doris/be/log
    networks:
      doris_net:
        ipv4_address: 172.30.0.3

networks:
  doris_net:
    name: doris_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
